name: Build release .bas assets

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install click

      - name: Generate .BAS files into build/
        run: |
          mkdir -p build
          python process.py expand -y ./src ./build

      - name: Create build archive
        run: |
          tar -czf build.tar.gz build

      - name: Create source archive
        run: |
          tar -czf source.tar.gz src process.py process

      - name: Collect top-level BAS release assets
        run: |
          mkdir -p release-assets
          find build -type f -iname '*.BAS' -exec cp {} release-assets/ \;

      # Upload to GitHub Release when triggered by release publication
      - name: Upload BAS files to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/*
            build.tar.gz
            source.tar.gz

      # Upload as workflow artifacts when manually triggered
      - name: Upload workflow artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: generated-bas-assets
          path: |
            release-assets/*
            build.tar.gz
            source.tar.gz