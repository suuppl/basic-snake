name: Build and publish pre-release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history for tagging)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install click

      - name: Compute version
        id: version
        run: |
          SHA=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y%m%d)

          BASE="v0.0.${DATE}.${SHA}"

          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "version=$BASE" >> $GITHUB_OUTPUT

      - name: Check if release exists
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "Release already exists — skipping build"
            exit 0
          fi

      - name: Build .BAS files
        run: |
          mkdir -p build
          python process.py expand -y ./src ./build

      - name: Create archives
        run: |
          tar -czf build.tar.gz build
          tar -czf source.tar.gz src process.py process

      - name: Collect BAS files
        run: |
          mkdir -p release-assets
          find build -type f -iname '*.BAS' -exec cp {} release-assets/ \;

      - name: Create and push tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -f "$VERSION"
          git push origin "$VERSION" --force
      
      - name: Create release notes file
        run: |
          cat > release-notes.md <<EOF
          Pre-release build

          Commit: ${{ steps.version.outputs.sha }}
          Version: ${{ steps.version.outputs.version }}
          EOF

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.version }}" \
            release-assets/* \
            build.tar.gz \
            source.tar.gz \
            --title "Pre-release ${{ steps.version.outputs.version }}" \
            --notes-file release-notes.md \
            --prerelease \
            --verify-tag